# ----------------------------------------------------------------
# Linux endpoints — Juice Shop (DMZ) + Ubuntu workstation (LAN1)
# ----------------------------------------------------------------
[linux_endpoints]
juice-shop    ansible_host=<DMZ_JUICESHOP_IP>
ubuntu-lan1   ansible_host=<LAN1_UBUNTU_IP>

[linux_endpoints:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3

# ----------------------------------------------------------------
# Windows endpoint — Windows 10 workstation (LAN1)
# Requires WinRM to be enabled on the target.
# Run on the Windows host to enable WinRM:
#   powershell -Command "Enable-PSRemoting -Force"
# ----------------------------------------------------------------
[windows_endpoints]
windows-lan1  ansible_host=<LAN1_WINDOWS_IP>

[windows_endpoints:vars]
ansible_user=Administrator
ansible_password=<WINDOWS_ADMIN_PASSWORD>
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore
ansible_port=5985

# ----------------------------------------------------------------
# SOC servers — Wazuh Manager + Ansible controller (LAN2)
# ----------------------------------------------------------------
[soc_servers]
wazuh-manager  ansible_host=<LAN2_WAZUH_IP>
ansible-server ansible_host=<LAN2_ANSIBLE_IP>

[soc_servers:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa

# ----------------------------------------------------------------
# Global variables — shared across all groups
# ----------------------------------------------------------------
[all:vars]
wazuh_manager_ip=<LAN2_WAZUH_IP>
wazuh_version=4.9.0-1
